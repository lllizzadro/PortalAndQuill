{% extends "base.html" %}

{% block title %}Events - Portal and Quill{% endblock %}

{% block content %}
<section class="section">
    <div class="section-head">
        <h2 class="section-title">Upcoming Events</h2>
    </div>

    <div class="event-list">
        {% for event in events %}
        <article class="event">
            <img class="event-image" src="{{ url_for('static', filename='images/' ~ event.image) }}"" alt="">
            <div class="event-info">
                <div class="card-date">
                    <span class="card-month">{{ event.month }}</span>
                    <span class="card-day">{{ event.day }}</span>
                </div>
                <h3 class="event-title">{{ event.title }}</h3>
                <p class="event-when">{{ event.when }}</p>
                <p class="event-description">{{ event.description }}</p>
            </div>
        </article>
        {% endfor %}
    </div>
</section>
{% endblock %}
