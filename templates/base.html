<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Portal and Quill{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <header>
        <!-- Logo Goes Here Later -->
        <a href="{{ url_for('home') }}">Portal &amp; Quill</a>
        <button class="nav-toggle" aria-label="Toggle menu" aria-expanded="false">&#9776;</button>
        {% set nav_links = [
            ('home', 'Home'),
            ('events', 'Events'),
            ('about', 'About the Store'),
            ('visit', 'Visit Us'),
            ('contact', 'Contact Us'),
        ] %}
        <nav>
            {% for endpoint, label in nav_links %}
            <a href="{{ url_for(endpoint) }}" class="{{ 'active' if request.endpoint == endpoint }}">{{ label }}</a>
            {% endfor %}
        </nav>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer>
        <p>&copy; 2026 Portal &amp; Quill.</p>
    </footer>
    <script src="{{ url_for('static', filename='js/nav.js')}}"></script>
</body>
</html>
