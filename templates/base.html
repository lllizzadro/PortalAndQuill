<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Portal and Quill{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <header>
        <!-- Logo Goes Here Later -->
        <a href="{{ url_for('home') }}">Portal &amp; Quill</a>
        <nav>
            <a href="{{ url_for('home') }}">Home</a>
            <a href="{{ url_for('events') }}">Events</a>
            <a href="{{ url_for('about') }}">About the Store</a>
            <a href="{{ url_for('visit') }}">Visit Us</a>
            <a href="{{ url_for('contact') }}">Contact Us</a>
        </nav>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer>
        <p>&copy; 2026 Portal &amp; Quill.</p>
    </footer>
</body>
</html>
